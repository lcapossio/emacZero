# Lint + simulation regression. Mirrors `python build_and_test.py`.

name: sim

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sim:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install HDL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator
          iverilog -V | head -1
          verilator --version

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run lint + simulation
        run: python build_and_test.py
